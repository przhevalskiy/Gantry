# Agent Manifest Configuration

build:
  context:
    root: ../
    include_paths:
      - Keystone
    dockerfile: Keystone/Dockerfile
    dockerignore: Keystone/.dockerignore

local_development:
  agent:
    port: 8000
    host_address: host.docker.internal
  paths:
    acp: project/acp.py
    worker: project/run_worker.py

agent:
  acp_type: agentic
  name: swarm-factory
  description: "Durable Software Engineering Factory — Architect → Builder → Inspector → Security → DevOps"
  temporal:
    enabled: true
    workflows:
      - name: swarm-factory
        queue_name: web_scout_queue
        description: "Durable Software Engineering Factory — Architect → Builder → Inspector → Security → DevOps"

deployment:
  image:
    repository: ""
    tag: "latest"
  imagePullSecrets:
    - name: my-registry-secret
  global:
    agent:
      name: "swarm-factory"
      description: "Durable Software Engineering Factory — Architect → Builder → Inspector → Security → DevOps"
    replicaCount: 1
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
